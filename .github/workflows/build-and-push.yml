on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            context: ./server
            dockerfile: ./server/Dockerfile
          - name: client
            context: ./client-app
            dockerfile: ./client-app/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout k8s-manifests
        uses: actions/checkout@v4
        with:
          repository: oss-slu/k8s-manifests
          token: ${{ secrets.K8S_MANIFESTS_TOKEN }}
          path: k8s-manifests
      - name: Update image tags
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          sed -i "s|ghcr.io/oss-slu/material-derailleur/client:.*|ghcr.io/oss-slu/material-derailleur/client:${SHA_TAG}|" k8s-manifests/mdma/client.yaml
          sed -i "s|ghcr.io/oss-slu/material-derailleur/server:.*|ghcr.io/oss-slu/material-derailleur/server:${SHA_TAG}|" k8s-manifests/mdma/server.yaml
      - name: Commit and push
        run: |
          cd k8s-manifests
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mdma/client.yaml mdma/server.yaml
          git commit -m "chore: update mdma images to ${{ github.sha }}"
          git push
